<!DOCTYPE html><html lang="sv"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Tidrapport Pro</title><meta name="theme-color" content="#1565c0"><link rel="manifest" href="manifest.json"><link rel="stylesheet" href="style.css"></head><body><div class="app"><header class="topbar"><div><h1>Tidrapport Pro</h1><p>Snabb tidrapportering utan start- och sluttid</p></div><button id="themeToggle" class="icon-btn">🌙</button></header><main><section id="dashboard" class="page active"><h2>Översikt</h2><div class="cards"><article class="card"><span>Idag</span><strong id="todayHours">0 h</strong></article><article class="card"><span>Denna vecka</span><strong id="weekHours">0 h</strong></article><article class="card"><span>Denna månad</span><strong id="monthHours">0 h</strong></article><article class="card"><span>Kilometer</span><strong id="monthKm">0 km</strong></article></div><button class="primary" onclick="openPage('formPage')">➕ Ny tidrapport</button><h3>Senaste rapporter</h3><div id="recentList" class="list empty">Inga rapporter ännu.</div></section><section id="formPage" class="page"><h2 id="formTitle">Ny tidrapport</h2><form id="reportForm"><input type="hidden" id="editId"><label>Datum<input id="date" type="date" required></label><label>Projekt<input id="project" placeholder="Ex. P1012" required></label><label>Kund<input id="customer" placeholder="Ex. DHL"></label><label>Arbetsplats<input id="location" placeholder="Ex. Västberga"></label><label>Arbetade timmar<input id="hours" type="number" min="0" step="0.25" placeholder="Ex. 7.5" required></label><label>Kilometer<input id="km" type="number" min="0" step="1" placeholder="0"></label><label>Kommentar<textarea id="comment" rows="4" placeholder="Vad gjorde du?"></textarea></label><button class="primary" type="submit">💾 Spara</button><button class="secondary" type="button" onclick="resetForm()">Rensa</button></form></section><section id="history" class="page"><h2>Historik</h2><input id="searchInput" class="search" type="search" placeholder="Sök projekt, kund, plats eller datum..."><div id="historyList" class="list empty">Inga rapporter ännu.</div></section><section id="stats" class="page"><h2>Statistik</h2><div class="cards"><article class="card"><span>Totalt timmar</span><strong id="totalHours">0 h</strong></article><article class="card"><span>Totalt km</span><strong id="totalKm">0 km</strong></article><article class="card"><span>Projekt</span><strong id="projectCount">0</strong></article><article class="card"><span>Rapporter</span><strong id="reportCount">0</strong></article></div><h3>Per projekt</h3><div id="projectStats" class="list"></div></section><section id="exportPage" class="page"><h2>Export</h2><button class="primary" onclick="exportCSV()">📑 Exportera CSV</button><button class="primary" onclick="exportExcel()">📊 Exportera Excel</button><button class="primary" onclick="exportPDF()">📄 Skapa PDF / skriv ut</button><button class="danger" onclick="confirmClearAll()">🗑️ Radera alla rapporter</button></section></main><nav class="bottom-nav"><button onclick="openPage('dashboard')">🏠<span>Start</span></button><button onclick="openPage('formPage')">➕<span>Ny</span></button><button onclick="openPage('history')">📋<span>Historik</span></button><button onclick="openPage('stats')">📊<span>Statistik</span></button><button onclick="openPage('exportPage')">📄<span>Export</span></button></nav></div><script src="storage.js"></script><script src="export.js"></script><script src="app.js"></script></body></html>
